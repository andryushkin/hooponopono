<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(-45deg, #667eea, #764ba2, #5a67d8, #6b46c1);
        background-size: 400% 400%;
        animation: gradientFlow 20s ease infinite;
        font-family: Georgia, 'Times New Roman', serif;
      }

      @keyframes gradientFlow {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .container {
        text-align: center;
        padding: 2rem;
        max-width: 560px;
      }

      h1 {
        color: #87d7af;
        font-size: 2rem;
        font-weight: normal;
        letter-spacing: 0.04em;
        margin-bottom: 1.5rem;
        line-height: 1.3;
      }

      p {
        color: rgba(255, 255, 255, 0.75);
        font-size: 1.1rem;
        line-height: 1.7;
      }
    </style>
  </head>
  <body dir="auto">
    <div class="container">
      <h1 id="title"></h1>
      <p id="message"></p>
    </div>
    <script src="welcome.js"></script>
  </body>
</html>
