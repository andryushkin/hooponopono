<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ho'oponopono</title>
        <link rel="stylesheet" href="style.css?v=5" />
    </head>
    <body>
        <div class="language-selector">
            <div class="language-dropdown">
                <button class="language-button" id="languageButton">EN</button>
                <div class="language-menu" id="languageMenu">
                    <div class="language-option" data-lang="en">EN - English</div>
                    <div class="language-option" data-lang="ru">RU - Русский</div>
                    <div class="language-option" data-lang="es">ES - Español</div>
                    <div class="language-option" data-lang="pt">PT - Português</div>
                    <div class="language-option" data-lang="de">DE - Deutsch</div>
                    <div class="language-option" data-lang="cs">CS - Čeština</div>
                    <div class="language-option" data-lang="fr">FR - Français</div>
                    <div class="language-option" data-lang="ja">JA - 日本語</div>
                    <div class="language-option" data-lang="zh">ZH - 中文</div>
                    <div class="language-option" data-lang="id">ID - Indonesia</div>
                    <div class="language-option" data-lang="ms">MS - Melayu</div>
                    <div class="language-option" data-lang="ar">AR - العربية</div>
                </div>
            </div>
            <button id="muteButton" class="mute-button hidden">🔇</button>
            <div id="online" class="online">Connecting...</div>
        </div>

        <div class="container">
            <div class="phrase-container">
                <div id="phrase" class="phrase"></div>
            </div>
        </div>

        <div class="cws-link-container">
            <a class="btn-cws" href="CHROME_WEB_STORE_URL" target="_blank" rel="noopener">
                <svg width="16" height="16" viewBox="0 0 20 20" aria-hidden="true">
                    <path d="M10,10 L10,0 A10,10 0 0,1 18.66,15 Z" fill="#EA4335"/>
                    <path d="M10,10 L18.66,15 A10,10 0 0,1 1.34,15 Z" fill="#34A853"/>
                    <path d="M10,10 L1.34,15 A10,10 0 0,1 10,0 Z" fill="#FBBC04"/>
                    <circle cx="10" cy="10" r="5.5" fill="white"/>
                    <circle cx="10" cy="10" r="4" fill="#4285F4"/>
                </svg>
                Add to Chrome
            </a>
        </div>

        <script src="script.js"></script>
    </body>
</html>
